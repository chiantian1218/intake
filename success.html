<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Submitted - DA Customization Intake</title>
  <style>
    :root {
      --bg: #eef3f8;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #5b6678;
      --accent: #0f4c81;
      --accent-strong: #0a3558;
      --success: #0f7a3e;
      --shadow: 0 18px 42px rgba(15, 76, 129, 0.08);
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 80px 20px;
      background:
        radial-gradient(circle at top left, rgba(15, 76, 129, 0.08), transparent 24%),
        linear-gradient(180deg, #f4f8fb 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .card {
      max-width: 560px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid rgba(15, 76, 129, 0.12);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .check-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
    }

    h1 {
      margin: 0 0 12px;
      color: var(--accent-strong);
    }

    p {
      color: var(--muted);
      margin: 12px 0;
    }

    .actions {
      margin-top: 28px;
    }

    a.btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    a.btn:hover {
      background: var(--accent-strong);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check-icon">&check;</div>
    <h1>Request Submitted</h1>
    <p>Thank you for submitting your Dynamic Application customization request.</p>
    <p>Our team has received your requirements and will review them shortly. A confirmation and next steps will be sent to the email address you provided.</p>
    <div class="actions">
      <a class="btn" href="index.html">Submit Another Request</a>
    </div>
  </div>
</body>
</html>
